<svg width="800" height="600" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="150" fill="#020617"/>
  
  <!-- Blueprint Grid -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="200" height="150" fill="url(#grid)" />

  <!-- Stickman Sketch (Accurate Proportions & Layering) -->
  <g transform="translate(70, 30)">
    
    <!-- Body (Drawn first so it's behind the head) -->
    <rect x="18" y="30" width="24" height="45" rx="12" fill="#020617" stroke="#cbd5e1" stroke-width="2.5" />
    
    <!-- Arms -->
    <path d="M 25,45 Q 40,55 60,45" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.5" />
    <path d="M 35,45 Q 50,55 70,45" fill="none" stroke="#cbd5e1" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Legs -->
    <path d="M 25,75 Q 25,87.5 25,100" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" opacity="0.5" />
    <path d="M 35,75 Q 35,87.5 35,100" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" />

    <!-- Head (Drawn after body to cover overlap) -->
    <g transform="translate(30, 18)">
      <circle cx="0" cy="0" r="16" fill="#020617" stroke="#cbd5e1" stroke-width="2.5" />
      <circle cx="8" cy="-2" r="1.5" fill="#cbd5e1" />
    </g>
    
    <!-- Technical Callouts -->
    <line x1="10" y1="18" x2="50" y2="18" stroke="#475569" stroke-width="0.5" stroke-dasharray="2,2" />
    <text x="5" y="20" font-family="monospace" font-size="4" fill="#475569">HEAD_GRP</text>
    
    <line x1="10" y1="75" x2="50" y2="75" stroke="#475569" stroke-width="0.5" stroke-dasharray="2,2" />
    <text x="5" y="77" font-family="monospace" font-size="4" fill="#475569">LIMB_ROOT</text>
  </g>

  <text x="100" y="140" font-family="monospace" font-size="6" fill="#475569" text-anchor="middle" style="text-transform: uppercase; letter-spacing: 0.2em; font-weight: bold;">System.Animation.Module_v1.0</text>
</svg>
